<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Vendors | Supply Chain Tracker</title>

    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/forms.css" />
    <link rel="stylesheet" href="./css/vendors.css" />
  </head>

  <body>
    <header>
      <nav aria-label="Main navigation">
        <a href="./index.html">Home</a>
        <a href="./vendors.html">Vendors</a>
        <a href="./items.html">Items</a>
      </nav>
    </header>

    <main>
      <section class="page-header">
        <div>
          <h1>Vendor Management</h1>

          <p>
            Manage vendor contacts, product categories, ratings, delivery
            observations, notes, and associated SKUs.
          </p>
        </div>

        <button
          id="show-vendor-form-button"
          class="primary-button"
          type="button"
        >
          + New Vendor
        </button>
      </section>

      <section
        id="vendor-form-panel"
        class="form-panel hidden"
        aria-labelledby="vendor-form-heading"
      >
        <div class="form-header">
          <h2 id="vendor-form-heading">Add a New Vendor</h2>

          <p>
            Enter the vendor's contact information, product capabilities, and
            sourcing notes.
          </p>
        </div>

        <form id="vendor-form">
          <div class="form-grid">
            <div class="form-field">
              <label for="vendor-name">Vendor Name</label>

              <input
                id="vendor-name"
                name="vendorName"
                type="text"
                placeholder="Example: Pacific Food Supply"
                required
              />
            </div>

            <div class="form-field">
              <label for="contact-person">Contact Person</label>

              <input
                id="contact-person"
                name="contactPerson"
                type="text"
                placeholder="Example: Amy Lee"
              />
            </div>

            <div class="form-field">
              <label for="vendor-email">Email</label>

              <input
                id="vendor-email"
                name="email"
                type="email"
                placeholder="amy@example.com"
              />
            </div>

            <div class="form-field">
              <label for="vendor-phone">Phone</label>

              <input
                id="vendor-phone"
                name="phone"
                type="tel"
                placeholder="510-555-1000"
              />
            </div>

            <div class="form-field">
              <label for="vendor-website">Website</label>

              <input
                id="vendor-website"
                name="website"
                type="url"
                placeholder="https://example.com"
              />
            </div>

            <div class="form-field">
              <label for="product-categories"> Main Product Categories </label>

              <input
                id="product-categories"
                name="productCategories"
                type="text"
                placeholder="Frozen fruit, puree, packaging"
              />
            </div>

            <div class="form-field">
              <label for="vendor-rating">Personal Rating</label>

              <select id="vendor-rating" name="rating">
                <option value="">Select a rating</option>
                <option value="1">1 out of 5</option>
                <option value="2">2 out of 5</option>
                <option value="3">3 out of 5</option>
                <option value="4">4 out of 5</option>
                <option value="5">5 out of 5</option>
              </select>
            </div>

            <div class="form-field">
              <label for="associated-skus">Associated SKUs</label>

              <input
                id="associated-skus"
                name="associatedSkus"
                type="text"
                placeholder="SKU-001, SKU-002"
              />
            </div>

            <div class="form-field form-field-full">
              <label for="delivery-performance"> Delivery Performance </label>

              <textarea
                id="delivery-performance"
                name="deliveryPerformance"
                rows="3"
                placeholder="Example: Some delays during peak season"
              ></textarea>
            </div>

            <div class="form-field form-field-full">
              <label for="vendor-notes">General Notes</label>

              <textarea
                id="vendor-notes"
                name="notes"
                rows="4"
                placeholder="Add pricing, communication, product, or sourcing notes"
              ></textarea>
            </div>
          </div>

          <div class="form-actions">
            <button class="primary-button" type="submit">Save Vendor</button>

            <button class="secondary-button" type="reset">Clear Form</button>
          </div>
        </form>
      </section>

      <section class="search-section" aria-label="Search vendors">
        <label for="vendor-search">Search Vendors</label>

        <input
          id="vendor-search"
          name="vendor-search"
          type="search"
          placeholder="Search by vendor name or product category"
        />
      </section>

      <section class="vendor-list-section">
        <h2>Vendor List</h2>

        <div id="vendor-list" class="vendor-grid"></div>
      </section>
    </main>

    <script type="module" src="./js/vendors.js"></script>
  </body>
</html>
